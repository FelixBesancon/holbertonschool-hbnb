<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img class="logo" src="images/logo.png" alt="Logo HBnB">
        <nav>
            <a href="index.html">Home</a>
            <a id="login-link" class="login-button" href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <section id="place-details" class="place-details">
            <!-- Place details will be populated dynamically -->
        </section>
        <section id="reviews">
            <h2>Reviews</h2>
            <!-- Review cards will be populated dynamically -->
        </section>
        <section id="add-review">
            <h2>Add a Review</h2>
            <a id="add-review-link" class="details-button" href="add_review.html" style="display: none;">Add Review</a>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <img class="footer-icon" src="images/icon.png" alt="Site icon">
            <p class="footer-rights">All rights reserved.</p>
            <p class="footer-credit">Designed by Félix Besançon</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
