<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img class="logo" src="images/logo.png" alt="Logo HBnB">
        <nav>
            <a href="index.html">Home</a>
            <a id="login-link" class="login-button" href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <!-- Add something to idfentify the place you're reviewing -->
        <form id="review-form">
            <h2>Add a Review</h2>
            <p id="review-place-context"></p>
            <label for="review">Your Review:</label>
            <textarea id="review" name="review" required></textarea>
            <label for="rating">Rating:</label>
            <div id="star-rating" class="star-rating" role="radiogroup" aria-label="Rating"></div>
            <input type="hidden" id="rating" name="rating" value="0" required>
            <p id="review-form-error" role="alert" style="display: none;"></p>
            <button type="submit">Submit Review</button>
        </form>
    </main>
    <footer>
        <div class="footer-content">
            <img class="footer-icon" src="images/icon.png" alt="Site icon">
            <p class="footer-rights">All rights reserved.</p>
            <p class="footer-credit">Designed by Félix Besançon</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
