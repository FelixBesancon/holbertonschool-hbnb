<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img class="logo" src="images/logo.png" alt="Logo HBnB">
        <nav>
            <a href="index.html">Home</a>
            <a id="login-link" class="login-button" href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <form id="login-form">
            <h2>Login</h2>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Login</button>
        </form>
    </main>
    <footer>
        <div class="footer-content">
            <img class="footer-icon" src="images/icon.png" alt="Site icon">
            <p class="footer-rights">All rights reserved.</p>
            <p class="footer-credit">Designed by Félix Besançon</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
